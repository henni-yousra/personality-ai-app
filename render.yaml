# Blueprint Render : le code Python est dans backend/ (monorepo).
# Déploiement : Render → New → Blueprint → connecter ce dépôt, ou ajuster un service existant (voir README).
services:
  - type: web
    name: personality-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Secrets Render : GROQ_API_KEY, GMAIL_* ou SMTP_*
      # Front sur Netlify : CORS_ALLOW_NETLIFY=true  OU  CORS_ORIGINS=https://votre-site.netlify.app
