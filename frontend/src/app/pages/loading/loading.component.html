<div class="page-container loading-page">
  <div class="container">

    @if (!error()) {
      <!-- Animation de chargement -->
      <div class="loading-content animate-fade-in-scale">

        <!-- Orbe animée -->
        <div class="loading-orb-wrapper">
          <div class="loading-orb">
            <div class="loading-orb-inner">🌿</div>
          </div>
          <div class="loading-rings">
            <div class="loading-ring ring-1"></div>
            <div class="loading-ring ring-2"></div>
            <div class="loading-ring ring-3"></div>
          </div>
        </div>

        <!-- Texte -->
        <div class="loading-text">
          <h2>Votre rapport est en cours de création</h2>
          <p class="loading-message">{{ currentMessage() }}</p>
        </div>

        <!-- Dots de progression -->
        <div class="loading-dots">
          <span class="dot"></span>
          <span class="dot" style="animation-delay: 0.2s"></span>
          <span class="dot" style="animation-delay: 0.4s"></span>
        </div>

        <!-- Note rassurante -->
        <p class="loading-note">
          Notre IA analyse vos réponses pour créer un profil<br>
          unique et personnalisé. Cela prend environ 30 secondes.
        </p>
      </div>
    }

    @if (error()) {
      <!-- État d'erreur -->
      <div class="loading-error animate-fade-in">
        <div class="error-icon">🌧</div>
        <h2>Une erreur est survenue</h2>
        <p>{{ error() }}</p>
        <button class="btn btn-primary" (click)="retry()">
          Réessayer
        </button>
      </div>
    }

  </div>
</div>
